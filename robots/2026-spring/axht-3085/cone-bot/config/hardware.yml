button:
  type: DigitalSensor
  port: 0
imu:
  type: IMU
front_right_ir_sensor:
  type: IRSensor
  port: 0
distance_sensor:
  type: AnalogSensor
  port: 1
wait_for_light_sensor:
  type: AnalogSensor
  port: 5
cone_arm_down_button:
  type: DigitalSensor
  port: 0
cone_arm_up_button:
  type: DigitalSensor
  port: 1
front:
  type: SensorGroup
  right: front_right_ir_sensor
_motors: !include-merge 'motors.yml'
_servos: !include-merge 'servos.yml'
