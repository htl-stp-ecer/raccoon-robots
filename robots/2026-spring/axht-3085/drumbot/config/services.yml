vision:
  module: src.daemons.vision
  restart: always
  restart_sec: 1
  after_sync: restart_if_changed
  required_for_run: true
  # Detection debug frames are OFF by default (heavy SD-card I/O). To capture
  # them for a session, add: env: { DRUMBOT_DETECTION_DEBUG: "1" }
  watch:
    - src/daemons/vision.py
    - src/hardware/usb_camera.py
    - src/service/color_detection_service.py