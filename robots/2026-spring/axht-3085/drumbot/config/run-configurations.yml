dev:
  name: dev
  description: 'Fast iteration: --dev --no-checkpoints'
  target: auto
  dev: true
  no_calibrate: false
  no_checkpoints: true
  no_codegen: false
  no_sync: false
  record_localization: false
  record_hz:
  args: []
  env: {}
dev-nc:
  name: dev-nc
  description: 'Fast iteration: --dev --no-calibrate --no-checkpoints'
  target: auto
  dev: true
  no_calibrate: true
  no_checkpoints: true
  no_codegen: false
  no_sync: false
  record_localization: false
  record_hz:
  args: [ ]
  env: { }
dev-fake:
  name: dev-fake
  description: 'Fast iteration: --dev --no-checkpoints; uses fake cam service'
  target: auto
  dev: true
  no_calibrate: false
  no_checkpoints: true
  no_codegen: false
  no_sync: false
  record_localization: false
  record_hz:
  args: []
  env:
    DRUMBOT_FAKE_CAMERA: '1'
dev-nc-fake:
  name: dev-fake
  description: 'Fast iteration: --dev --no-calibrate --no-checkpoints; uses fake cam service'
  target: auto
  dev: true
  no_calibrate: true
  no_checkpoints: true
  no_codegen: false
  no_sync: false
  record_localization: false
  record_hz:
  args: []
  env:
    DRUMBOT_FAKE_CAMERA: '1'
