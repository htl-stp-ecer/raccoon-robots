[project]
name = "drumbot"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "raccoon-library",
    "raccoon-cli",
    "raccoon-transport"
]

[project.scripts]
start = "src.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
