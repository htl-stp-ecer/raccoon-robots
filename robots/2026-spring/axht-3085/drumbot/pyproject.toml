[project]
name = "drumbot"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "raccoon-library==1.0.101",
    "raccoon-cli==0.1.154",
    "raccoon-transport"
]

[project.scripts]
start = "src.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
